<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeonPDF Global Translator // Live AI Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --accent-color: #ff0050;
            --text-color: #e0e0e0;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.05);
            --neon-glow: 0 0 15px rgba(255, 0, 80, 0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); min-height: 100vh; display: flex; flex-direction: column; }
        
        header {
            padding: 15px 20px;
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
        }
        header h1 { font-size: 1.5rem; color: #fff; text-shadow: var(--neon-glow); letter-spacing: 2px; }

        main {
            flex: 1;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 20px;
        }

        @media (max-width: 992px) { main { grid-template-columns: 1fr; } }

        .control-panel {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            height: fit-content;
        }

        .workspace {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            min-height: 600px;
        }

        .drop-zone {
            border: 2px dashed rgba(255, 0, 80, 0.3);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .drop-zone:hover { border-color: var(--accent-color); background: rgba(255, 0, 80, 0.02); }

        .btn {
            background: transparent;
            border: 1px solid var(--accent-color);
            color: #fff;
            padding: 10px 20px;
            font-size: 0.9rem;
            text-transform: uppercase;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: var(--neon-glow);
        }
        .btn:hover { background: var(--accent-color); box-shadow: 0 0 20px var(--accent-color); }
        .btn:disabled { border-color: #444; color: #666; box-shadow: none; cursor: not-allowed; }

        .translation-list {
            max-height: 350px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 5px;
        }

        .trans-item {
            background: rgba(0,0,0,0.4);
            padding: 10px;
            border-radius: 6px;
            border-left: 3px solid var(--accent-color);
        }
        .trans-item label { font-size: 0.75rem; color: #888; display: block; margin-bottom: 4px; }
        .trans-item input {
            width: 100%;
            background: #111;
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 6px;
            border-radius: 4px;
            font-size: 0.85rem;
        }

        #previewCanvas {
            max-width: 100%;
            background: #fff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border-radius: 4px;
        }

        .status { font-size: 0.85rem; color: #aaa; text-align: center; font-family: monospace; }
        footer { text-align: center; padding: 15px; font-size: 0.75rem; color: #444; border-top: 1px solid var(--glass-border); }
    </style>
</head>
<body>

    <header>
        <h1>NEONPDF // LIVE GOOGLE TRANSLATION CORE</h1>
    </header>

    <main>
        <div class="control-panel">
            <div class="drop-zone" id="dropZone">
                <p>Drag & Drop ANY English PDF Book</p>
                <input type="file" id="fileInput" style="display:none" accept=".pdf">
            </div>

            <div class="status" id="statusBox">System Ready. Load Document...</div>

            <div style="display:flex; justify-content: space-between; align-items:center;">
                <button class="btn" id="prevPage" disabled>Prev</button>
                <span id="pageCounter">Page: 0/0</span>
                <button class="btn" id="nextPage" disabled>Next</button>
            </div>

            <hr style="border:0; border-top:1px solid var(--glass-border); margin:5px 0;">
            
            <button class="btn" id="translatePageBtn" disabled style="width:100%; border-color:#00ff66; box-shadow: 0 0 10px rgba(0,255,102,0.3);">
                ⚡ Auto-Translate Entire Page
            </button>

            <div style="font-size:0.85rem; font-weight:600; color:var(--accent-color); margin-top:5px;">LIVE TRANSLATION PREVIEW:</div>
            <div class="translation-list" id="translationList"></div>

            <button class="btn" id="renderPdfBtn" disabled style="width:100%;">Compile Native Hindi PDF</button>
        </div>

        <div class="workspace">
            <canvas id="previewCanvas"></canvas>
        </div>
    </main>

    <footer>CREATED BY ASHISH © 2026 // SUPERSURFACE MEDIA LABS</footer>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let rawPdfBytes = null;
        let pdfDocInstance = null;
        let currentPageNum = 1;
        let pageTextItems = [];
        let poppinsFontBytes = null;

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const statusBox = document.getElementById('statusBox');
        const translationList = document.getElementById('translationList');
        const previewCanvas = document.getElementById('previewCanvas');
        const translatePageBtn = document.getElementById('translatePageBtn');
        const renderPdfBtn = document.getElementById('renderPdfBtn');

        // High-Fidelity Font Pre-loader
        async function loadNativeFont() {
            try {
                statusBox.innerText = "[CORE] Fetching Devanagari Typeface...";
                const response = await fetch('https://cdn.jsdelivr.net/npm/poppins-font@0.0.3/fonts/Poppins-Regular.ttf');
                poppinsFontBytes = await response.arrayBuffer();
                statusBox.innerText = "[SYSTEM] Ready. Embed Engine Live.";
            } catch (err) {
                statusBox.innerText = "[ERROR] Font failed. Check Network.";
            }
        }
        loadNativeFont();

        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => { if(e.target.files[0]) loadPDF(e.target.files[0]); });
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); });
        dropZone.addEventListener('drop', (e) => { e.preventDefault(); if(e.dataTransfer.files[0]) loadPDF(e.dataTransfer.files[0]); });

        async function loadPDF(file) {
            statusBox.innerText = "Analyzing file stream...";
            const reader = new FileReader();
            reader.onload = async function(e) {
                rawPdfBytes = e.target.result;
                pdfDocInstance = await pdfjsLib.getDocument({data: rawPdfBytes}).promise;
                currentPageNum = 1;
                document.getElementById('prevPage').disabled = false;
                document.getElementById('nextPage').disabled = false;
                renderPage(currentPageNum);
            };
            reader.readAsArrayBuffer(file);
        }

        async function renderPage(pageNum) {
            if (!pdfDocInstance) return;
            statusBox.innerText = `Mapping coordinates for Page ${pageNum}...`;
            document.getElementById('pageCounter').innerText = `Page: ${pageNum}/${pdfDocInstance.numPages}`;

            const page = await pdfDocInstance.getPage(pageNum);
            const viewport = page.getViewport({scale: 1.5});
            
            previewCanvas.height = viewport.height;
            previewCanvas.width = viewport.width;
            const context = previewCanvas.getContext('2d');
            
            // Draw original structures, graphics, and backgrounds cleanly
            await page.render({canvasContext: context, viewport: viewport}).promise;

            const textContent = await page.getTextContent();
            pageTextItems = textContent.items;

            translationList.innerHTML = '';
            
            pageTextItems.forEach((item, index) => {
                if(!item.str.trim() || item.str.length < 2) return;

                const div = document.createElement('div');
                div.className = 'trans-item';
                div.innerHTML = `
                    <label>Original Line [${index}]:</label>
                    <span style="font-size:0.8rem; color:#aaa; display:block; margin-bottom:4px;">"${item.str}"</span>
                    <input type="text" id="node_${index}" value="${item.str}" data-idx="${index}">
                `;
                translationList.appendChild(div);
            });

            statusBox.innerText = `Isolated ${pageTextItems.length} text elements. Ready to translate.`;
            translatePageBtn.disabled = false;
            renderPdfBtn.disabled = false;
        }

        // --- GLOBAL LIVE TRANSLATION ENGINE CORE ---
        // Hits Google's public translation stack directly from browser asynchronously
        async function fetchGoogleTranslation(text) {
            if(!text.trim() || !isNaN(text)) return text;
            try {
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=hi&dt=t&q=${encodeURIComponent(text)}`;
                const response = await fetch(url);
                const result = await response.json();
                if(result && result[0]) {
                    return result[0].map(line => line[0]).join('');
                }
                return text;
            } catch (err) {
                console.error("Translation API glitch:", err);
                return text; // Fallback to raw text without crashing process
            }
        }

        // Sequential batch processing to ensure 0 lag and avoid getting blocked
        translatePageBtn.addEventListener('click', async () => {
            translatePageBtn.disabled = true;
            const inputs = translationList.querySelectorAll('input');
            let completed = 0;

            statusBox.innerText = `Translating 0/${inputs.length} elements via cloud proxy...`;

            for(let input of inputs) {
                const originalText = input.value;
                if(originalText.trim().length > 1) {
                    const translated = await fetchGoogleTranslation(originalText);
                    input.value = translated;
                }
                completed++;
                statusBox.innerText = `Translating ${completed}/${inputs.length} nodes...`;
            }

            statusBox.innerText = "All words parsed into Hindi successfully!";
            translatePageBtn.disabled = false;
        });

        // Navigation Bindings
        document.getElementById('prevPage').addEventListener('click', () => { if(currentPageNum > 1) { currentPageNum--; renderPage(currentPageNum); } });
        document.getElementById('nextPage').addEventListener('click', () => { if(currentPageNum < pdfDocInstance.numPages) { currentPageNum++; renderPage(currentPageNum); } });

        // Compile & In-Place Masking Execution Layer
        renderPdfBtn.addEventListener('click', async () => {
            if(!rawPdfBytes || !poppinsFontBytes) return alert("System engines uninitialized.");
            
            statusBox.innerText = "Clearing text planes & masking vectors...";
            const pdfDoc = await PDFLib.PDFDocument.load(rawPdfBytes);
            pdfDoc.registerFontkit(window.fontkit);
            const customHindiFont = await pdfDoc.embedFont(poppinsFontBytes);
            
            const pages = pdfDoc.getPages();
            const targetPage = pages[currentPageNum - 1];

            const inputs = translationList.querySelectorAll('input');
            
            inputs.forEach(input => {
                const idx = input.getAttribute('data-idx');
                const originalNode = pageTextItems[idx];
                const translatedText = input.value;

                const x = originalNode.transform[4];
                const y = originalNode.transform[5];
                const fontHeight = originalNode.height || originalNode.transform[0] || 10;
                const stringWidthEstimate = originalNode.width || (originalNode.str.length * fontHeight * 0.5);

                // Clear English text space perfectly white
                targetPage.drawRectangle({
                    x: x,
                    y: y - 2,
                    width: stringWidthEstimate + 6,
                    height: fontHeight + 4,
                    color: PDFLib.rgb(1, 1, 1),
                });

                // Write native Hindi translation over exact coordinates
                if (translatedText.trim() !== "") {
                    targetPage.drawText(translatedText, {
                        x: x,
                        y: y,
                        size: fontHeight * 0.92,
                        font: customHindiFont,
                        color: PDFLib.rgb(0, 0, 0)
                    });
                }
            });

            statusBox.innerText = "Assembling binary document structure...";
            const alteredPdfBytes = await pdfDoc.save();
            
            const blob = new Blob([alteredPdfBytes], { type: "application/pdf" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `Translated_Page_${currentPageNum}_Native.pdf`;
            link.click();
            
            statusBox.innerText = "Compilation successful. File dispatched.";
        });
    </script>
    <script src="https://unpkg.com/@pdf-lib/fontkit@1.1.1/dist/fontkit.umd.min.js"></script>
</body>
</html>
