<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>NCERT Hindi PDF Cloner Engine</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script type="module" src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

<script src="https://unpkg.com/@pdf-lib/fontkit/dist/fontkit.umd.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
font-family:'Poppins',sans-serif;
color:white;
overflow:hidden;
}

.app{
display:flex;
height:100vh;
width:100%;
}

.sidebar{
width:340px;
background:rgba(255,255,255,0.04);
border-right:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
padding:22px;
overflow:auto;
}

.main{
flex:1;
display:flex;
flex-direction:column;
overflow:hidden;
}

.header{
height:80px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 25px;
border-bottom:1px solid rgba(255,255,255,0.08);
background:rgba(255,255,255,0.03);
}

.brand{
font-size:24px;
font-weight:700;
background:linear-gradient(90deg,#ff0050,#10b981);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.section{
margin-bottom:25px;
}

.section h3{
font-size:14px;
margin-bottom:12px;
color:#ff0050;
}

input{
width:100%;
padding:14px;
border-radius:14px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
color:white;
outline:none;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:16px;
background:linear-gradient(90deg,#ff0050,#ff3366);
color:white;
font-weight:700;
cursor:pointer;
margin-top:12px;
transition:0.3s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 10px 30px rgba(255,0,80,0.3);
}

.secondary{
background:linear-gradient(90deg,#10b981,#0fd78f);
}

.panel-grid{
flex:1;
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
padding:18px;
overflow:hidden;
}

.panel{
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
border-radius:24px;
display:flex;
flex-direction:column;
overflow:hidden;
}

.panel-header{
padding:16px;
border-bottom:1px solid rgba(255,255,255,0.08);
font-weight:600;
}

.stream{
flex:1;
overflow:auto;
padding:16px;
font-size:13px;
line-height:1.7;
}

.log{
padding:12px;
border-radius:12px;
margin-bottom:10px;
background:rgba(255,255,255,0.05);
}

.green{
background:rgba(16,185,129,0.1);
border:1px solid rgba(16,185,129,0.2);
}

.red{
background:rgba(255,0,80,0.1);
border:1px solid rgba(255,0,80,0.2);
}

.orange{
background:rgba(255,166,0,0.1);
border:1px solid rgba(255,166,0,0.2);
}

.preview{
height:320px;
margin:0 18px 18px;
background:rgba(255,255,255,0.04);
border-radius:24px;
border:1px solid rgba(255,255,255,0.08);
overflow:auto;
padding:20px;
}

.metric-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.metric{
background:rgba(255,255,255,0.05);
padding:16px;
border-radius:16px;
}

.metric h2{
margin-top:8px;
}

.progress{
width:100%;
height:10px;
border-radius:999px;
background:rgba(255,255,255,0.05);
overflow:hidden;
margin-top:15px;
}

.progress-inner{
height:100%;
width:0%;
background:linear-gradient(90deg,#ff0050,#10b981);
transition:0.4s;
}

canvas{
max-width:100%;
border-radius:12px;
}

.small{
font-size:12px;
color:#aaa;
margin-top:10px;
}

</style>
</head>

<body>

<div class="app">

<div class="sidebar">

<div class="section">

<h3>Upload English PDF</h3>

<input type="file" id="pdfInput" accept=".pdf">

<div class="small">
Upload NCERT / NEET English PDF
</div>

</div>

<div class="section">

<h3>Upload Hindi Unicode Font (.ttf)</h3>

<input type="file" id="fontInput" accept=".ttf">

<div class="small">
Use NotoSansDevanagari-Regular.ttf
</div>

</div>

<div class="section">

<button id="startBtn">
Start Hindi Conversion
</button>

<button class="secondary" id="downloadBtn" disabled>
Download Hindi PDF
</button>

</div>

<div class="section">

<h3>Telemetry</h3>

<div class="metric-grid">

<div class="metric">
<div>Pages</div>
<h2 id="pageCount">0</h2>
</div>

<div class="metric">
<div>Status</div>
<h2 id="statusText">Idle</h2>
</div>

<div class="metric">
<div>Chunks</div>
<h2 id="chunkCount">0</h2>
</div>

<div class="metric">
<div>Tokens</div>
<h2 id="tokenCount">0</h2>
</div>

</div>

<div class="progress">
<div class="progress-inner" id="progressBar"></div>
</div>

</div>

</div>

<div class="main">

<div class="header">

<div class="brand">
NCERT Hindi PDF Cloner
</div>

<div>
Unicode Rendering Engine
</div>

</div>

<div class="panel-grid">

<div class="panel">

<div class="panel-header">
English Extraction Stream
</div>

<div class="stream" id="englishStream"></div>

</div>

<div class="panel">

<div class="panel-header">
Hindi Layout Synchronization
</div>

<div class="stream" id="hindiStream"></div>

</div>

</div>

<div class="preview" id="previewWrap"></div>

</div>

</div>

<script type="module">

import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs';

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';

const {
PDFDocument,
rgb
} = PDFLib;

const pdfInput=document.getElementById('pdfInput');
const fontInput=document.getElementById('fontInput');

const startBtn=document.getElementById('startBtn');
const downloadBtn=document.getElementById('downloadBtn');

const englishStream=document.getElementById('englishStream');
const hindiStream=document.getElementById('hindiStream');

const pageCountEl=document.getElementById('pageCount');
const statusText=document.getElementById('statusText');
const chunkCountEl=document.getElementById('chunkCount');
const tokenCountEl=document.getElementById('tokenCount');
const progressBar=document.getElementById('progressBar');

const previewWrap=document.getElementById('previewWrap');

let finalBlob=null;

const scientificDictionary={

"Metabolism":"चयापचय [Metabolism]",
"Fermentation":"किण्वन [Fermentation]",
"Xylem":"जाइलम [Xylem]",
"Phloem":"फ्लोएम [Phloem]",
"Bryophytes":"ब्रायोफाइट्स [Bryophytes]",
"Protonema":"प्रोटोनिमा [Protonema]",
"Alcohol":"अल्कोहल [Alcohol]",
"Phenol":"फिनोल [Phenol]",
"Ether":"ईथर [Ether]",
"Hydroxy":"हाइड्रॉक्सी [Hydroxy]",
"Oxidation":"ऑक्सीकरण [Oxidation]",
"Reduction":"अपचयन [Reduction]",
"Hydrogen":"हाइड्रोजन [Hydrogen]",
"Reaction":"अभिक्रिया [Reaction]"

};

function log(container,text,type=''){

const div=document.createElement('div');

div.className=`log ${type}`;

div.innerText=text;

container.prepend(div);

}

function updateProgress(v){

progressBar.style.width=v+'%';

}

function splitChunks(text,size=1400){

const words=text.split(' ');

const chunks=[];

let current='';

for(const word of words){

if((current+word).length>size){

chunks.push(current);

current=word+' ';

}else{

current+=word+' ';

}

}

if(current.trim()){

chunks.push(current);

}

return chunks;

}

function translateScientific(text){

let output=text;

for(const key in scientificDictionary){

const regex=new RegExp(key,'gi');

output=output.replace(regex,scientificDictionary[key]);

}

output=output.replace(/Que\.\s*(\d+)/g,'प्रश्न $1');

output=output.replace(/\((\d+)\)/g,'($1)');

return output;

}

async function renderPreview(page){

previewWrap.innerHTML='';

const viewport=page.getViewport({scale:1.3});

const canvas=document.createElement('canvas');

const ctx=canvas.getContext('2d');

canvas.width=viewport.width;

canvas.height=viewport.height;

previewWrap.appendChild(canvas);

await page.render({
canvasContext:ctx,
viewport
}).promise;

}

async function processPDF(){

try{

const pdfFile=pdfInput.files[0];

const fontFile=fontInput.files[0];

if(!pdfFile){

alert('Upload PDF');

return;

}

if(!fontFile){

alert('Upload Hindi TTF Font');

return;

}

startBtn.disabled=true;

statusText.innerText='Loading';

englishStream.innerHTML='';
hindiStream.innerHTML='';

const pdfBytes=await pdfFile.arrayBuffer();

const pdf=await pdfjsLib.getDocument({
data:pdfBytes
}).promise;

pageCountEl.innerText=pdf.numPages;

const newPdf=await PDFDocument.create();

newPdf.registerFontkit(fontkit);

const fontBytes=await fontFile.arrayBuffer();

const hindiFont=await newPdf.embedFont(fontBytes);

let totalChunks=0;
let totalTokens=0;

for(let pageNum=1;pageNum<=pdf.numPages;pageNum++){

statusText.innerText=`Page ${pageNum}`;

const page=await pdf.getPage(pageNum);

if(pageNum===1){

await renderPreview(page);

}

const viewport=page.getViewport({scale:2});

const textContent=await page.getTextContent();

const items=textContent.items;

let fullText='';

items.forEach(item=>{

fullText+=item.str+' ';

});

totalTokens+=fullText.length;

tokenCountEl.innerText=totalTokens;

log(
englishStream,
`Page ${pageNum} Extracted`
);

const translated=translateScientific(fullText);

const chunks=splitChunks(translated);

totalChunks+=chunks.length;

chunkCountEl.innerText=totalChunks;

const renderCanvas=document.createElement('canvas');

const ctx=renderCanvas.getContext('2d');

renderCanvas.width=viewport.width;

renderCanvas.height=viewport.height;

await page.render({
canvasContext:ctx,
viewport
}).promise;

const imgData=renderCanvas.toDataURL('image/jpeg',1.0);

const jpgImage=await newPdf.embedJpg(imgData);

const pdfPage=newPdf.addPage([
viewport.width,
viewport.height
]);

pdfPage.drawImage(jpgImage,{
x:0,
y:0,
width:viewport.width,
height:viewport.height
});

log(
hindiStream,
`Synchronizing Hindi Layout Page ${pageNum}`,
'green'
);

let y=viewport.height-60;

for(const item of items){

const x=item.transform[4];

const itemY=viewport.height-item.transform[5];

const original=item.str;

if(!original.trim()) continue;

let translatedText=
translateScientific(original);

translatedText=
translatedText.replace(/[�-]/g,'');

const width=item.width+8;

const height=14;

pdfPage.drawRectangle({
x:x-1,
y:itemY-2,
width:width,
height:height,
color:rgb(1,1,1),
opacity:1
});

pdfPage.drawText(
translatedText,
{
x:x,
y:itemY,
size:10,
font:hindiFont,
color:rgb(0,0,0),
maxWidth:width+100
}
);

}

const progress=Math.floor(
(pageNum/pdf.numPages)*100
);

updateProgress(progress);

}

const finalBytes=await newPdf.save();

finalBlob=new Blob(
[finalBytes],
{
type:'application/pdf'
}
);

downloadBtn.disabled=false;

statusText.innerText='Completed';

log(
hindiStream,
'PDF Conversion Completed Successfully',
'green'
);

}catch(err){

console.error(err);

statusText.innerText='Error';

log(
hindiStream,
err.message,
'red'
);

alert(err.message);

}finally{

startBtn.disabled=false;

}

}

startBtn.addEventListener(
'click',
processPDF
);

downloadBtn.addEventListener(
'click',
()=>{

if(!finalBlob) return;

const url=URL.createObjectURL(finalBlob);

const a=document.createElement('a');

a.href=url;

a.download='Hindi_Converted.pdf';

document.body.appendChild(a);

a.click();

a.remove();

URL.revokeObjectURL(url);

}
);

</script>

</body>
</html>
