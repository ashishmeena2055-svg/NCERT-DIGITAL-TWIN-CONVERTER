<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NCERT Hindi PDF Cloner</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

<script src="https://unpkg.com/@pdf-lib/fontkit/dist/fontkit.umd.min.js"></script>

<style>

body{
margin:0;
background:#0a0a0a;
font-family:Arial;
color:white;
overflow:hidden;
}

.container{
display:flex;
height:100vh;
}

.sidebar{
width:320px;
padding:20px;
background:#111;
overflow:auto;
border-right:1px solid #222;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.top{
padding:15px;
background:#111;
border-bottom:1px solid #222;
font-size:22px;
font-weight:bold;
color:#ff0050;
}

.content{
flex:1;
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
overflow:hidden;
}

.box{
background:#111;
border:1px solid #222;
border-radius:10px;
display:flex;
flex-direction:column;
overflow:hidden;
}

.box h3{
margin:0;
padding:12px;
background:#181818;
border-bottom:1px solid #222;
}

.logs{
flex:1;
overflow:auto;
padding:10px;
font-size:13px;
}

.log{
padding:8px;
margin-bottom:8px;
background:#181818;
border-radius:8px;
word-break:break-word;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:#ff0050;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

input{
width:100%;
padding:12px;
margin-top:8px;
background:#181818;
border:1px solid #333;
color:white;
border-radius:10px;
}

.status{
margin-top:15px;
padding:10px;
background:#181818;
border-radius:10px;
line-height:1.8;
}

.preview{
height:260px;
overflow:auto;
background:#111;
padding:10px;
border-top:1px solid #222;
}

canvas{
max-width:100%;
}

</style>
</head>

<body>

<div class="container">

<div class="sidebar">

<h2 style="color:#10b981;">PDF Controls</h2>

<label>Upload English PDF</label>
<input type="file" id="pdfInput" accept=".pdf">

<label style="margin-top:15px;display:block;">
Upload Hindi Unicode Font
</label>

<input type="file" id="fontInput" accept=".ttf,.otf">

<button id="startBtn">
Start Conversion
</button>

<button id="downloadBtn" disabled>
Download Hindi PDF
</button>

<div class="status">

<div>
Pages:
<span id="pageCount">0</span>
</div>

<div>
Status:
<span id="statusText">Idle</span>
</div>

<div>
Tokens:
<span id="tokenCount">0</span>
</div>

<div>
Nodes:
<span id="nodeCount">0</span>
</div>

</div>

</div>

<div class="main">

<div class="top">
NCERT Hindi PDF Cloner
</div>

<div class="content">

<div class="box">

<h3>
English Extraction
</h3>

<div class="logs" id="englishLogs"></div>

</div>

<div class="box">

<h3>
Hindi Synchronization
</h3>

<div class="logs" id="hindiLogs"></div>

</div>

</div>

<div class="preview" id="preview"></div>

</div>

</div>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const {
PDFDocument,
rgb
}=PDFLib;

const pdfInput=
document.getElementById('pdfInput');

const fontInput=
document.getElementById('fontInput');

const startBtn=
document.getElementById('startBtn');

const downloadBtn=
document.getElementById('downloadBtn');

const englishLogs=
document.getElementById('englishLogs');

const hindiLogs=
document.getElementById('hindiLogs');

const pageCount=
document.getElementById('pageCount');

const statusText=
document.getElementById('statusText');

const tokenCount=
document.getElementById('tokenCount');

const nodeCount=
document.getElementById('nodeCount');

const preview=
document.getElementById('preview');

let finalBlob=null;

const dictionary={

"Reaction":"अभिक्रिया",
"Hydrogen":"हाइड्रोजन",
"Oxidation":"ऑक्सीकरण",
"Reduction":"अपचयन",
"Question":"प्रश्न",
"Chapter":"अध्याय",
"Solution":"समाधान",
"Metabolism":"चयापचय",
"Fermentation":"किण्वन"

};

function addLog(container,text){

const div=document.createElement('div');

div.className='log';

div.innerText=text;

container.prepend(div);

}

function cleanText(text){

return String(text)
.replace(/[\u0000-\u001F]/g,' ')
.replace(/\s+/g,' ')
.trim();

}

function translate(text){

let out=text;

for(const key in dictionary){

const regex=
new RegExp(key,'gi');

out=
out.replace(
regex,
dictionary[key]
);

}

out=
out.replace(
/Que\.\s*(\d+)/g,
'प्रश्न $1'
);

return out;

}

function safeDraw({
page,
font,
text,
x,
y,
size,
maskWidth
}){

try{

text=cleanText(text);

if(!text.length) return;

const fittedSize=
Math.min(
size,
(maskWidth/
Math.max(text.length,1))*1.8
);

const textWidth=
font.widthOfTextAtSize(
text,
fittedSize
);

const adjustedX=
x+
((maskWidth-textWidth)/2);

page.drawText(
text,
{
x:adjustedX,
y:y,
size:fittedSize*0.82,
font:font,
color:rgb(0,0,0)
}
);

}catch(e){

console.log(e);

}

}

async function renderPreview(page){

preview.innerHTML='';

const viewport=
page.getViewport({
scale:1.2
});

const canvas=
document.createElement('canvas');

const ctx=
canvas.getContext('2d');

canvas.width=
viewport.width;

canvas.height=
viewport.height;

preview.appendChild(canvas);

await page.render({
canvasContext:ctx,
viewport
}).promise;

}

async function processPDF(){

try{

const pdfFile=
pdfInput.files[0];

const fontFile=
fontInput.files[0];

if(!pdfFile){

alert('Upload PDF');

return;

}

if(!fontFile){

alert('Upload Font');

return;

}

statusText.innerText='Loading';

startBtn.disabled=true;

const pdfBytes=
await pdfFile.arrayBuffer();

const pdf=
await pdfjsLib.getDocument({
data:pdfBytes
}).promise;

pageCount.innerText=
pdf.numPages;

const outputPdf=
await PDFDocument.create();

outputPdf.registerFontkit(fontkit);

const fontBytes=
await fontFile.arrayBuffer();

const unicodeFont=
await outputPdf.embedFont(
fontBytes,
{
subset:false
}
);

let totalTokens=0;

let totalNodes=0;

for(let p=1;p<=pdf.numPages;p++){

statusText.innerText=
'Page '+p;

const page=
await pdf.getPage(p);

if(p===1){

await renderPreview(page);

}

const viewport=
page.getViewport({
scale:2
});

const canvas=
document.createElement('canvas');

const ctx=
canvas.getContext('2d');

canvas.width=
viewport.width;

canvas.height=
viewport.height;

await page.render({
canvasContext:ctx,
viewport
}).promise;

const imageData=
canvas.toDataURL(
'image/jpeg',
1
);

const jpg=
await outputPdf.embedJpg(
imageData
);

const pdfPage=
outputPdf.addPage([
viewport.width,
viewport.height
]);

pdfPage.drawImage(
jpg,
{
x:0,
y:0,
width:viewport.width,
height:viewport.height
}
);

const textContent=
await page.getTextContent();

const items=
textContent.items;

for(const item of items){

try{

const original=
item.str;

if(!original.trim())
continue;

totalNodes++;

nodeCount.innerText=
totalNodes;

totalTokens+=
original.length;

tokenCount.innerText=
totalTokens;

addLog(
englishLogs,
original
);

let translated=
translate(original);

translated=
cleanText(translated);

const x=
item.transform[4];

const y=
viewport.height-
item.transform[5];

const fontSize=
Math.max(
8,
Math.min(
18,
item.height||10
)
);

const maskWidth=
Math.max(
item.width+20,
translated.length*
fontSize*
0.5
);

pdfPage.drawRectangle({
x:x-2,
y:y-2,
width:maskWidth,
height:fontSize+8,
color:rgb(1,1,1)
});

safeDraw({
page:pdfPage,
font:unicodeFont,
text:translated,
x:x,
y:y,
size:fontSize,
maskWidth:maskWidth
});

addLog(
hindiLogs,
translated
);

}catch(innerErr){

console.log(innerErr);

}

}

}

const finalBytes=
await outputPdf.save({
useObjectStreams:false
});

finalBlob=
new Blob(
[finalBytes],
{
type:'application/pdf'
}
);

downloadBtn.disabled=false;

statusText.innerText=
'Completed';

alert(
'Conversion Completed'
);

}catch(error){

console.error(error);

statusText.innerText=
'Error';

alert(error.message);

}finally{

startBtn.disabled=false;

}

}

startBtn.onclick=
processPDF;

downloadBtn.onclick=
function(){

if(!finalBlob) return;

const url=
URL.createObjectURL(
finalBlob
);

const a=
document.createElement('a');

a.href=url;

a.download=
'Hindi_Converted.pdf';

document.body.appendChild(a);

a.click();

a.remove();

URL.revokeObjectURL(url);

};

</script>

</body>
</html>
