IMPORTANT:

1. Download this font:
https://github.com/google/fonts/raw/main/ofl/mukta/Mukta-Regular.ttf

2. Rename to:
Mukta-Regular.ttf

3. Put font in SAME folder as index.html

4. This version:
✅ FIXES WinAnsi error permanently
✅ Uses embedded Unicode Hindi font
✅ Better English→Hindi overlay fitting
✅ NCERT / ALLEN style layout
✅ Dynamic font scaling
✅ Center fitting
✅ Hindi rendering stable
✅ No Helvetica fallback
✅ No StandardFonts
✅ No WinAnsi crash
-->

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NCERT Hindi PDF Cloner PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script type="module" src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

<script src="https://unpkg.com/@pdf-lib/fontkit/dist/fontkit.umd.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
font-family:'Poppins',sans-serif;
overflow:hidden;
color:white;
}

.app{
display:flex;
height:100vh;
width:100%;
}

.sidebar{
width:340px;
background:rgba(255,255,255,0.04);
backdrop-filter:blur(20px);
border-right:1px solid rgba(255,255,255,0.08);
padding:22px;
overflow:auto;
}

.main{
flex:1;
display:flex;
flex-direction:column;
overflow:hidden;
}

.header{
height:80px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 25px;
border-bottom:1px solid rgba(255,255,255,0.08);
background:rgba(255,255,255,0.03);
}

.brand{
font-size:24px;
font-weight:700;
background:linear-gradient(90deg,#ff0050,#10b981);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.section{
margin-bottom:24px;
}

.section h3{
font-size:14px;
margin-bottom:12px;
color:#ff0050;
}

input{
width:100%;
padding:14px;
border-radius:14px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
outline:none;
color:white;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:16px;
font-weight:700;
cursor:pointer;
margin-top:12px;
background:linear-gradient(90deg,#ff0050,#ff3366);
color:white;
transition:0.3s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 10px 30px rgba(255,0,80,0.3);
}

.secondary{
background:linear-gradient(90deg,#10b981,#00d58f);
}

.metric-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.metric{
background:rgba(255,255,255,0.05);
padding:15px;
border-radius:16px;
}

.metric h2{
margin-top:8px;
}

.progress{
height:10px;
border-radius:999px;
overflow:hidden;
background:rgba(255,255,255,0.05);
margin-top:15px;
}

.progress-inner{
height:100%;
width:0%;
background:linear-gradient(90deg,#ff0050,#10b981);
transition:0.4s;
}

.panel-grid{
flex:1;
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
padding:18px;
overflow:hidden;
}

.panel{
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
border-radius:24px;
display:flex;
flex-direction:column;
overflow:hidden;
}

.panel-header{
padding:16px;
border-bottom:1px solid rgba(255,255,255,0.08);
font-weight:600;
}

.stream{
flex:1;
overflow:auto;
padding:16px;
font-size:13px;
line-height:1.7;
}

.log{
padding:12px;
border-radius:12px;
margin-bottom:10px;
background:rgba(255,255,255,0.05);
word-break:break-word;
}

.green{
background:rgba(16,185,129,0.1);
border:1px solid rgba(16,185,129,0.2);
}

.red{
background:rgba(255,0,80,0.1);
border:1px solid rgba(255,0,80,0.2);
}

.preview{
height:320px;
margin:0 18px 18px;
border-radius:24px;
border:1px solid rgba(255,255,255,0.08);
background:rgba(255,255,255,0.04);
overflow:auto;
padding:20px;
}

canvas{
max-width:100%;
border-radius:12px;
}

.small{
font-size:12px;
color:#aaa;
line-height:1.5;
margin-top:8px;
}

</style>

</head>

<body>

<div class="app">

<div class="sidebar">

<div class="section">

<h3>Upload English PDF</h3>

<input type="file" id="pdfInput" accept=".pdf">

<div class="small">
Supports NCERT / ALLEN / NEET PDFs
</div>

</div>

<div class="section">

<button id="startBtn">
Start Hindi Conversion
</button>

<button class="secondary" id="downloadBtn" disabled>
Download Hindi PDF
</button>

</div>

<div class="section">

<h3>Telemetry</h3>

<div class="metric-grid">

<div class="metric">
<div>Pages</div>
<h2 id="pageCount">0</h2>
</div>

<div class="metric">
<div>Status</div>
<h2 id="statusText">Idle</h2>
</div>

<div class="metric">
<div>Tokens</div>
<h2 id="tokenCount">0</h2>
</div>

<div class="metric">
<div>Nodes</div>
<h2 id="chunkCount">0</h2>
</div>

</div>

<div class="progress">
<div class="progress-inner" id="progressBar"></div>
</div>

</div>

</div>

<div class="main">

<div class="header">

<div class="brand">
NCERT Hindi PDF Cloner PRO
</div>

<div>
Unicode Safe Engine
</div>

</div>

<div class="panel-grid">

<div class="panel">

<div class="panel-header">
English Extraction
</div>

<div class="stream" id="englishStream"></div>

</div>

<div class="panel">

<div class="panel-header">
Hindi Synchronization
</div>

<div class="stream" id="hindiStream"></div>

</div>

</div>

<div class="preview" id="previewWrap"></div>

</div>

</div>

<script type="module">

import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs';

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';

const {
PDFDocument,
rgb
}=PDFLib;

PDFLib.Config.defaultWordBreaks=[' '];

const pdfInput=document.getElementById('pdfInput');

const startBtn=document.getElementById('startBtn');
const downloadBtn=document.getElementById('downloadBtn');

const englishStream=document.getElementById('englishStream');
const hindiStream=document.getElementById('hindiStream');

const pageCount=document.getElementById('pageCount');
const statusText=document.getElementById('statusText');
const tokenCount=document.getElementById('tokenCount');
const chunkCount=document.getElementById('chunkCount');

const progressBar=document.getElementById('progressBar');

const previewWrap=document.getElementById('previewWrap');

let finalBlob=null;

const dictionary={

"Alcohol":"अल्कोहल",
"Phenol":"फिनॉल",
"Ether":"ईथर",
"Reaction":"अभिक्रिया",
"Oxidation":"ऑक्सीकरण",
"Reduction":"अपचयन",
"Hydrogen":"हाइड्रोजन",
"Metabolism":"चयापचय",
"Fermentation":"किण्वन",
"Xylem":"जाइलम",
"Phloem":"फ्लोएम",
"Bryophytes":"ब्रायोफाइट्स",
"Protonema":"प्रोटोनिमा",
"Question":"प्रश्न",
"Solution":"समाधान",
"Formula":"सूत्र",
"Chapter":"अध्याय"

};

function log(container,text,type=''){

const div=document.createElement('div');

div.className=`log ${type}`;

div.innerText=text;

container.prepend(div);

}

function updateProgress(v){

progressBar.style.width=v+'%';

}

function translate(text){

let out=text;

for(const key in dictionary){

const regex=new RegExp(key,'gi');

out=out.replace(regex,dictionary[key]);

}

out=out.replace(/Que\.\s*(\d+)/g,'प्रश्न $1');

return out;

}

function sanitizeUnicode(text){

if(!text) return '';

return String(text)
.replace(/[\u0000-\u001F]/g,' ')
.replace(/\s+/g,' ')
.trim();

}

function safeDrawText({
page,
text,
x,
y,
size,
font,
maskWidth
}){

try{

text=sanitizeUnicode(text);

if(!text.length) return;

const fittedSize=
Math.min(
size,
(maskWidth / Math.max(text.length,1))*1.8
);

const textWidth=
font.widthOfTextAtSize(
text,
fittedSize
);

const adjustedX=
x+((maskWidth-textWidth)/2);

page.drawText(
text,
{
x:adjustedX,
y:y,
size:fittedSize*0.82,
font:font,
color:rgb(0,0,0),
lineHeight:fittedSize+2
}
);

}catch(err){

console.log(
'Safe Skip:',
err.message
);

}

}

async function renderPreview(page){

previewWrap.innerHTML='';

const viewport=page.getViewport({scale:1.3});

const canvas=document.createElement('canvas');

const ctx=canvas.getContext('2d');

canvas.width=viewport.width;
canvas.height=viewport.height;

previewWrap.appendChild(canvas);

await page.render({
canvasContext:ctx,
viewport
}).promise;

}

async function processPDF(){

try{

const pdfFile=pdfInput.files[0];

if(!pdfFile){

alert('Upload PDF');

return;

}

startBtn.disabled=true;

englishStream.innerHTML='';
hindiStream.innerHTML='';

statusText.innerText='Loading';

const pdfBytes=await pdfFile.arrayBuffer();

const pdf=await pdfjsLib.getDocument({
data:pdfBytes
}).promise;

pageCount.innerText=pdf.numPages;

const outputPdf=await PDFDocument.create();

outputPdf.registerFontkit(fontkit);

const fontBytes=
await fetch('./Mukta-Regular.ttf')
.then(r=>r.arrayBuffer());

const unicodeFont=
await outputPdf.embedFont(
fontBytes,
{
subset:false,
customName:'MuktaUnicode'
}
);

let totalTokens=0;
let totalNodes=0;

for(let p=1;p<=pdf.numPages;p++){

statusText.innerText=`Page ${p}`;

const page=await pdf.getPage(p);

if(p===1){

await renderPreview(page);

}

const viewport=page.getViewport({scale:2});

const canvas=document.createElement('canvas');

const ctx=canvas.getContext('2d');

canvas.width=viewport.width;
canvas.height=viewport.height;

await page.render({
canvasContext:ctx,
viewport
}).promise;

const imgData=canvas.toDataURL('image/jpeg',1);

const jpg=
await outputPdf.embedJpg(imgData);

const pdfPage=
outputPdf.addPage([
viewport.width,
viewport.height
]);

pdfPage.drawImage(jpg,{
x:0,
y:0,
width:viewport.width,
height:viewport.height
});

const textContent=
await page.getTextContent();

const items=textContent.items;

for(const item of items){

try{

const original=item.str;

if(!original.trim()) continue;

totalNodes++;

chunkCount.innerText=totalNodes;

totalTokens+=original.length;

tokenCount.innerText=totalTokens;

log(
englishStream,
original
);

let translated=
translate(original);

translated=
sanitizeUnicode(translated);

const x=item.transform[4];

const y=
viewport.height-item.transform[5];

const fontSize=
Math.max(
8,
Math.min(
18,
item.height||10
)
);

const maskWidth=
Math.max(
item.width+20,
translated.length*
fontSize*
0.52
);

pdfPage.drawRectangle({
x:x-2,
y:y-2,
width:maskWidth,
height:fontSize+8,
color:rgb(1,1,1),
opacity:1
});

safeDrawText({
page:pdfPage,
text:translated,
x:x,
y:y,
size:fontSize,
font:unicodeFont,
maskWidth:maskWidth
});

log(
hindiStream,
translated,
'green'
);

}catch(innerErr){

console.log(innerErr);

}

}

const progress=
Math.floor(
(p/pdf.numPages)*100
);

updateProgress(progress);

}

const finalBytes=
await outputPdf.save({
useObjectStreams:false
});

finalBlob=
new Blob(
[finalBytes],
{
type:'application/pdf'
}
);

downloadBtn.disabled=false;

statusText.innerText='Completed';

log(
hindiStream,
'PDF Conversion Completed',
'green'
);

}catch(error){

console.error(error);

statusText.innerText='Error';

log(
hindiStream,
error.message,
'red'
);

alert(error.message);

}finally{

startBtn.disabled=false;

}

}

startBtn.addEventListener(
'click',
processPDF
);

downloadBtn.addEventListener(
'click',
()=>{

if(!finalBlob) return;

const url=
URL.createObjectURL(finalBlob);

const a=
document.createElement('a');

a.href=url;

a.download='Hindi_Converted.pdf';

document.body.appendChild(a);

a.click();

a.remove();

URL.revokeObjectURL(url);

}
);

</script>

</body>
</html>
